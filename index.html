<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XREXZ0B</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            color: #00ff41;
            font-family: 'Courier New', 'monospace', sans-serif;
            font-size: 11px;
            line-height: 1.3;
            height: 100vh;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .terminal {
            height: 100vh;
            padding: 15px;
            overflow-y: auto;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
            position: relative;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .terminal::-webkit-scrollbar {
            display: none;
        }

        .prompt {
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
            margin-right: 3px;
            font-weight: bold;
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 13px;
            background: linear-gradient(#00ff41, #00cc33);
            border-radius: 2px;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 5px #00ff41;
            margin-left: 1px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; transform: scaleY(1); }
            51%, 100% { opacity: 0; transform: scaleY(0.3); }
        }

        .line {
            margin-bottom: 1px;
            white-space: pre-wrap;
            word-break: break-all;
            text-shadow: 0 0 2px rgba(0,255,65,0.5);
        }

        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-size: 9px;
            z-index: 1000;
            border-bottom: 1px solid #00ff41;
            box-shadow: 0 0 10px #00ff41;
        }

        .scan-line {
            position: fixed;
            top: 25px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff41, #ff0080, #00ff41, transparent);
            animation: scan 2.5s infinite linear;
            z-index: 999;
            box-shadow: 0 0 10px #00ff41;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.08;
        }

        .glitch {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
            opacity: 0;
        }

        .vibration {
            animation: vibrate 0.1s infinite;
        }

        @keyframes vibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        .success { color: #00ff88 !important; text-shadow: 0 0 10px #00ff88; }
        .error { color: #ff0040 !important; text-shadow: 0 0 10px #ff0040; }
        .warning { color: #ffaa00 !important; text-shadow: 0 0 8px #ffaa00; }

        @media (max-width: 480px) {
            body { font-size: 10px; }
            .status-bar { font-size: 8px; padding: 0 8px; }
            .terminal { padding: 12px; }
        }

        @media (max-width: 360px) {
            body { font-size: 9px; }
            .status-bar { font-size: 7px; }
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>XREXZ0B v3.7.1 | root@darknet</span>
        <span id="stats">CPU:87% RAM:3GB NET:1.2Gbps</span>
    </div>
    
    <canvas class="matrix-bg" id="matrix"></canvas>
    <canvas class="glitch" id="glitch"></canvas>
    <div class="scan-line"></div>
    
    <div class="terminal" id="terminal">
        <div class="line success">XREXZ0B H4CK3R TERMINAL LOADED</div>
        <div class="line warning">[!] Touch screen untuk accelerate scan</div>
        <div class="line"><span class="prompt">root@xrexz0b:~#</span> <span class="cursor" id="cursor"></span></div>
    </div>

    <script>
        // Mobile optimized matrix
        const matrixCanvas = document.getElementById('matrix');
        const matrixCtx = matrixCanvas.getContext('2d');
        let cols, drops = [];

        function resizeMatrix() {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
            cols = Math.floor(matrixCanvas.width / 10) * 2;
            drops = Array(cols).fill(1);
        }
        resizeMatrix();

        const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲンガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポ";
        
        function drawMatrix() {
            matrixCtx.fillStyle = 'rgba(0,0,0,0.08)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            
            matrixCtx.fillStyle = 'rgba(0,255,65,0.9)';
            matrixCtx.font = '10px monospace';
            
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                matrixCtx.fillText(text, i * 10, drops[i] * 10);
                if (drops[i] * 10 > matrixCanvas.height && Math.random() > 0.95) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        // Glitch effect
        const glitchCanvas = document.getElementById('glitch');
        const glitchCtx = glitchCanvas.getContext('2d');
        
        function drawGlitch() {
            glitchCtx.clearRect(0, 0, glitchCanvas.width, glitchCanvas.height);
            if (Math.random() < 0.1) {
                glitchCtx.fillStyle = `rgba(255,0,64,${Math.random() * 0.3})`;
                glitchCtx.fillRect(0, 0, glitchCanvas.width, glitchCanvas.height * 0.02);
            }
        }

        // Terminal logic
        const terminal = document.getElementById('terminal');
        const cursor = document.getElementById('cursor');
        const stats = document.getElementById('stats');

        const prompts = [
            "root@xrexz0b:~# ", "hacker@ghost:~$ ", "pwn@target:~# ", 
            "scan@net:~$ ", "root@payload:~# ", "xrexz0b@dark:~# "
        ];

        const codeLines = [];
        const templates = [
            "exploit = b'\\\\x90' * 100 + shellcode",
            "sock.connect(('target.com', 1337))",
            "payload = base64.b64decode('...')",
            "for port in range(1,65536): scan(port)",
            "hashcat -m 0 hash.txt rockyou.txt",
            "msfvenom -p windows/shell_reverse_tcp",
            "'; DROP TABLE users; --",
            "buffer = 'A'*1024 + shellcode",
            "python -c 'import pty;pty.spawn(\"/bin/bash\")'"
        ];

        // Generate 20k lines untuk mobile (lebih cepat)
        for (let i = 0; i < 20000; i++) {
            const randTemplate = templates[Math.floor(Math.random()*templates.length)];
            codeLines.push(`${String(i).padStart(5,'0')} ${randTemplate.replace('...', Math.random().toString(36).substr(2,8))}`);
        }

        let lineIdx = 0, charIdx = 0, promptIdx = 0;
        let speed = 25; // Faster untuk mobile
        let isAccelerated = false;

        function typeNextLine() {
            const lineEl = document.createElement('div');
            lineEl.className = 'line';
            
            const prompt = prompts[promptIdx % prompts.length];
            const cmd = ['nmap -sS', 'hydra -l admin', 'sqlmap -u', 'msfvenom'][Math.floor(Math.random()*4)];
            
            lineEl.innerHTML = `<span class="prompt">${prompt}</span>`;
            terminal.appendChild(lineEl);
            scrollBottom();

            const text = cmd + codeLines[lineIdx].slice(25);
            
            function typeChar() {
                if (charIdx < text.length) {
                    lineEl.innerHTML += text[charIdx];
                    charIdx++;
                    scrollBottom();
                    
                    const delay = isAccelerated ? speed/3 : speed;
                    setTimeout(typeChar, delay + Math.random()*10);
                } else {
                    // Fake output
                    setTimeout(() => {
                        const outEl = document.createElement('div');
                        outEl.className = `line ${['success','error','warning'][Math.floor(Math.random()*3)]}`;
                        outEl.textContent = `[${['+','-','!'][Math.floor(Math.random()*3)]}] ${Math.random().toString(36).substr(2,12)} (${Math.floor(Math.random()*9999)}B)`;
                        terminal.appendChild(outEl);
                        scrollBottom();
                        
                        lineIdx++; charIdx = 0; promptIdx++;
                        
                        if (lineIdx < 100) {
                            setTimeout(typeNextLine, isAccelerated ? 200 : 800);
                        }
                    }, 150);
                }
            }
            typeChar();
        }

        function scrollBottom() {
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Update stats
        setInterval(() => {
            const cpu = Math.floor(Math.random()*100);
            const ram = Math.floor(Math.random()*16);
            stats.textContent = `CPU:${cpu}% RAM:${ram}GB NET:${(Math.random()*10).toFixed(1)}Gbps`;
        }, 2000);

        // Animation loop
        function animate() {
            drawMatrix();
            drawGlitch();
            requestAnimationFrame(animate);
        }

        // Touch controls
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            document.body.classList.add('vibration');
            isAccelerated = true;
            speed = 8;
            setTimeout(() => {
                document.body.classList.remove('vibration');
                isAccelerated = false;
                speed = 25;
            }, 3000);
        }, {passive: false});

        // Start
        resizeMatrix();
        setTimeout(typeNextLine, 800);
        animate();

        // Resize handler
        window.addEventListener('resize', resizeMatrix);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeMatrix, 300);
        });
    </script>
</body>
</html>
