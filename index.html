<!DOCTYPE html>
<html lang="id">
<head>
    <title>XREXZOB Oprek Terminal</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .input-box { border: 1px solid #0f0; background: #000; color: #0f0; width: 100%; }
        #log { margin-top: 20px; color: #00ff00; }
    </style>
</head>
<body>
    <h1>[ XREXZOB-TERMINAL ]</h1>
    <p>Target: fayupedia.id</p>
    
    <div>
        <label>Cookie:</label><br>
        <textarea id="cookie" class="input-box" rows="3">Masukin cookie dari HttpCanary</textarea>
    </div>
    <br>
    <div>
        <label>XSRF-Token:</label><br>
        <input type="text" id="token" class="input-box" value="Masukin token dari HttpCanary">
    </div>
    
    <button onclick="gasOprek()" style="margin-top:10px;">EKSEKUSI JALUR KIRI</button>

    <div id="log">> Siap ngoprek...</div>

    <script>
        function gasOprek() {
            const cookie = document.getElementById('cookie').value;
            const token = document.getElementById('token').value;
            const log = document.getElementById('log');

            log.innerHTML += "<br>> Mengirim payload dengan token: " + token.substring(0, 10) + "...";
            
            // Catatan: Ini akan kena blokir CORS kalau langsung ke fayupedia.
            // Solusinya: Lo harus pake Proxy atau jalankan lewat aplikasi 'Acode'
            log.innerHTML += "<br>> Error: Browser memblokir akses (CORS).";
            log.innerHTML += "<br>> Saran: Salin kode ini ke Acode/Termux buat bypass.";
        }
    </script>
</body>
</html>
