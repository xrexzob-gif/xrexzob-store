<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Xrexzob Calculator v2.0 - HACKED</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000;
            color: #00ff41;
            font-family: 'Orbitron', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* Matrix rain effect */
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        .terminal {
            position: relative;
            z-index: 10;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            border: 2px solid #00ff41;
            border-radius: 15px;
            padding: 25px;
            margin: 20px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 
                0 0 50px #00ff41,
                inset 0 0 50px rgba(0,255,65,0.1);
            animation: glitch 3s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-1px, 1px); }
            40% { transform: translate(-2px, -1px); }
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .logo {
            font-size: 18px;
            font-weight: 900;
            color: #ff0040;
            text-shadow: 0 0 10px #ff0040;
            margin-bottom: 5px;
        }
        
        .version { color: #00ff41; }
        
        .display {
            background: #001100;
            border: 1px solid #00aa28;
            color: #00ff41;
            font-size: 2.2rem;
            font-weight: 700;
            padding: 20px;
            text-align: right;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 70px;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(0,255,65,0.2);
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff41;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        button {
            height: 65px;
            border: 1px solid #00aa28;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,65,0.3), transparent);
            transition: 0.5s;
        }
        
        button:hover::before { left: 100%; }
        
        .num { 
            background: #001a00; 
            color: #00ff41; 
            box-shadow: 0 0 15px rgba(0,255,65,0.3);
        }
        .num:hover { background: #002200; transform: scale(1.02); }
        
        .op { 
            background: #1a0000; 
            color: #ff0040; 
            box-shadow: 0 0 15px rgba(255,0,64,0.5);
            font-size: 1.6rem;
        }
        .op:hover { background: #2a0000; }
        
        .eq { 
            background: linear-gradient(45deg, #ff0040, #00ff41); 
            color: #000; 
            font-size: 1.8rem;
            box-shadow: 0 0 25px #ff0040;
        }
        .eq:hover { transform: scale(1.05); box-shadow: 0 0 35px #00ff41; }
        
        .clear { 
            background: #330000; 
            color: #ff6666; 
            box-shadow: 0 0 15px rgba(255,102,102,0.5);
        }
        .clear:hover { background: #440000; }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            animation: scan 3s linear infinite;
            z-index: 20;
        }
        
        @keyframes scan {
            0% { top: -2px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100vh; opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="scanline"></div>
    
    <div class="terminal">
        <div class="header">
            <div class="logo">Xrexzob v2.0</div>
            <div class="version">[HACKED BY PEGAS]</div>
            <div style="color:#666;font-size:12px;">> calculator module loaded</div>
        </div>
        
        <div class="display" id="display">0</div>
        
        <div class="buttons">
            <button class="clear" onclick="clearAll()">CLEAR</button>
            <button class="clear" onclick="deleteLast()">DEL</button>
            <button class="op" onclick="appendToDisplay('/')">/</button>
            <button class="op" onclick="appendToDisplay('*')">x</button>
            
            <button class="num" onclick="appendToDisplay('7')">7</button>
            <button class="num" onclick="appendToDisplay('8')">8</button>
            <button class="num" onclick="appendToDisplay('9')">9</button>
            <button class="op" onclick="appendToDisplay('-')">-</button>
            
            <button class="num" onclick="appendToDisplay('4')">4</button>
            <button class="num" onclick="appendToDisplay('5')">5</button>
            <button class="num" onclick="appendToDisplay('6')">6</button>
            <button class="op" onclick="appendToDisplay('+')">+</button>
            
            <button class="num" onclick="appendToDisplay('1')">1</button>
            <button class="num" onclick="appendToDisplay('2')">2</button>
            <button class="num" onclick="appendToDisplay('3')">3</button>
            <button class="eq" onclick="calculate()">=</button>
            
            <button class="num" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button class="num" onclick="appendToDisplay('.')">.</button>
        </div>
        
        <div style="text-align:center;margin-top:15px;font-size:11px;color:#666;">
            > press keys 0-9 + - * / = Enter
        </div>
    </div>

    <script>
        // Matrix rain
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                
                if (y * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            });
        }
        
        setInterval(drawMatrix, 50);
        
        // Calculator logic
        let display = '0';
        
        function appendToDisplay(value) {
            if (display === '0' || display === 'Error') {
                display = value;
            } else {
                display += value;
            }
            updateDisplay();
        }
        
        function updateDisplay() {
            document.getElementById('display').textContent = display;
        }
        
        function calculate() {
            try {
                const result = eval(display.replace('x', '*'));
                display = Number.isInteger(result) ? result : result.toFixed(8);
                updateDisplay();
            } catch {
                display = 'Error';
                updateDisplay();
            }
        }
        
        function clearAll() {
            display = '0';
            updateDisplay();
        }
        
        function deleteLast() {
            display = display.slice(0, -1) || '0';
            updateDisplay();
        }
        
        // Keyboard
        document.addEventListener('keydown', e => {
            if (/[0-9.]/.test(e.key)) appendToDisplay(e.key);
            if (e.key === '+') appendToDisplay('+');
            if (e.key === '-') appendToDisplay('-');
            if (e.key === '*') appendToDisplay('x');
            if (e.key === '/') appendToDisplay('/');
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') deleteLast();
        });
    </script>
</body>
</html>
