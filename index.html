<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            color: #fff; 
            font-family: sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container { 
            background: rgba(17, 17, 17, 0.95); 
            border: 1px solid #444; 
            border-radius: 20px; 
            padding: 30px; 
            max-width: 450px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .rainbow-text { 
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
            background-image: linear-gradient(90deg, #ff0000, #ffeb3b, #4caf50, #2196f3, #9c27b0, #ff0000);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text; 
            color: transparent;
            animation: rainbow_shift 3s linear infinite; 
        }
        @keyframes rainbow_shift {
            to { background-position: 200% center; }
        }
        .subtitle { font-size: 12px; color: #888; margin-bottom: 25px; letter-spacing: 1px; }
        label { display: block; text-align: left; font-size: 11px; margin-bottom: 5px; color: #aaa; }
        select, input { 
            width: 100%; padding: 12px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; outline: none;
        }
        .btn-order { 
            background: linear-gradient(45deg, #ff0000, #ffeb3b, #4caf50, #2196f3, #9c27b0);
            background-size: 200% auto;
            color: #fff; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 15px; animation: rainbow_shift 5s linear infinite;
        }
        .btn-raisya {
            display: block; width: 100%; padding: 12px; background: #25d366; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; margin-bottom: 10px; box-sizing: border-box;
        }
        .btn-xrexzob {
            display: block; width: 100%; padding: 12px; background: transparent; border: 2px solid #e1306c; color: #e1306c; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; box-sizing: border-box;
        }
        .footer { margin-top: 25px; font-size: 11px; color: #555; border-top: 1px solid #222; padding-top: 15px; }
        optgroup { background: #111; color: #ffeb3b; }
    </style>
</head>
