<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Jam Digital</title>
    <style>
        /* Mengatur agar konten tepat di tengah layar */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Latar belakang hitam pekat */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* Gaya angka jam */
        .clock {
            font-size: 12vw; /* Ukuran font fleksibel sesuai lebar layar */
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 5px;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Gaya untuk tanggal di bawah jam */
        .date {
            font-size: 2vw;
            color: #888;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 10px;
        }

        /* Animasi kedip pada titik dua (optional) */
        .blink {
            animation: blinker 1s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="clock" id="displayJam">00:00:00</div>
        <div class="date" id="displayTanggal">SENIN, 01 JANUARI 2024</div>
    </div>

    <script>
        function tampilkanWaktu() {
            const waktuSekarang = new Date();
            
            // Ambil Jam, Menit, dan Detik
            let h = waktuSekarang.getHours();
            let m = waktuSekarang.getMinutes();
            let s = waktuSekarang.getSeconds();
            
            // Format 2 digit (misal: 09 bukan 9)
            h = (h < 10) ? "0" + h : h;
            m = (m < 10) ? "0" + m : m;
            s = (s < 10) ? "0" + s : s;

            // Masukkan ke dalam HTML
            // Bagian m (menit) diapit titik dua
            document.getElementById("displayJam").innerHTML = `${h}:${m}:${s}`;

            // Format Tanggal Indonesia
            const opsiTanggal = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const tanggalStr = waktuSekarang.toLocaleDateString('id-ID', opsiTanggal);
            document.getElementById("displayTanggal").innerText = tanggalStr;
        }

        // Update setiap detik (1000 milidetik)
        setInterval(tampilkanWaktu, 1000);

        // Jalankan langsung saat halaman dibuka
        tampilkanWaktu();
    </script>
</body>
</html>
