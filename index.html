<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web AI Skillan - Index</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 15px;
            transition: all 0.3s ease;
        }
        
        .feature:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.3);
        }
        
        .feature h3 {
            margin-bottom: 0.5rem;
            color: #ffd93d;
        }
        
        .chat-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            padding: 1rem 3rem;
            font-size: 1.2rem;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
        }
        
        .chat-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .typing {
            overflow: hidden;
            border-right: 3px solid #ffd93d;
            white-space: nowrap;
            animation: typing 3s steps(40, end), blink-caret 0.75s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #ffd93d }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Web AI Skillan</h1>
        <p class="subtitle">Otaknya ga ada, tapi skillnya <span class="typing">MAX LEVEL! 🔥</span></p>
        
        <div class="features">
            <div class="feature">
                <h3>💻 Coding</h3>
                <p>HTML, CSS, JS, Python</p>
            </div>
            <div class="feature">
                <h3>🧠 Chat</h3>
                <p>Jawab semua pertanyaan</p>
            </div>
            <div class="feature">
                <h3>🎨 Design</h3>
                <p>UI/UX modern</p>
            </div>
            <div class="feature">
                <h3>🚀 API</h3>
                <p>Integrasi mudah</p>
            </div>
        </div>
        
        <a href="#chat" class="chat-btn">Chat Sekarang! 💬</a>
        
        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">
            Dibuat dengan ❤️ oleh Blackbox AI
        </p>
    </div>

    <script>
        // Smooth scroll ke chat (bisa ditambahin chat widget nanti)
        document.querySelector('.chat-btn').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Chat AI skillan siap jawab semua! 🚀\nCoba tanya coding, design, atau apa aja!');
        });

        // Particle effect
        function createParticle() {
            const particle = document.createElement('div');
            particle.style.position = 'fixed';
            particle.style.width = '4px';
            particle.style.height = '4px';
            particle.style.background = '#ffd93d';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = '100vh';
            particle.style.animation = 'fall linear infinite';
            
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 3000);
        }
        
        setInterval(createParticle, 300);
    </script>
</body>
</html>
