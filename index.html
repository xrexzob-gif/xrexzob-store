<script>
    // Set key default
    const DEFAULT_KEY = "ARIFIN";
    if (!localStorage.getItem("vaultKey")) {
        localStorage.setItem("vaultKey", btoa(DEFAULT_KEY));
    }

    // Enkripsi sederhana
    function encrypt(text, key) {
        return btoa(text.split('').map((c, i) =>
            String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))
        ).join(''));
    }

    function decrypt(text, key) {
        try {
            text = atob(text);
            return text.split('').map((c, i) =>
                String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))
            ).join('');
        } catch {
            return "";
        }
    }

    function login() {
        const inputKey = document.getElementById("keyInput").value;
        const savedKey = atob(localStorage.getItem("vaultKey"));

        if (inputKey === savedKey) {
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("vault").classList.remove("hidden");
            loadData(inputKey);
        } else {
            alert("Key salah!");
        }
    }

    function logout() {
        location.reload();
    }

    function saveNotes() {
        const key = document.getElementById("keyInput").value;
        const notes = document.getElementById("notes").value;
        localStorage.setItem("secureNotes", encrypt(notes, key));
        alert("Catatan disimpan!");
    }

    function loadData(key) {
        const encryptedNotes = localStorage.getItem("secureNotes");
        if (encryptedNotes) {
            document.getElementById("notes").value =
                decrypt(encryptedNotes, key);
        }

        const photo = localStorage.getItem("securePhoto");
        if (photo) {
            document.getElementById("photoPreview").src = photo;
        }

        const fileName = localStorage.getItem("secureFileName");
        if (fileName) {
            document.getElementById("fileName").textContent =
                "File tersimpan: " + fileName;
        }
    }

    // Simpan Foto
    document.getElementById("photoInput").addEventListener("change", function() {
        const reader = new FileReader();
        reader.onload = function() {
            localStorage.setItem("securePhoto", reader.result);
            document.getElementById("photoPreview").src = reader.result;
        };
        reader.readAsDataURL(this.files[0]);
    });

    // Simpan File
    document.getElementById("fileInput").addEventListener("change", function() {
        const file = this.files[0];
        localStorage.setItem("secureFileName", file.name);
        document.getElementById("fileName").textContent =
            "File tersimpan: " + file.name;
    });
</script>
