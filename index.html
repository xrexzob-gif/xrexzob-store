<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XrexZob Cyber Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Share Tech Mono', monospace;
        }

        body {
            background: black;
            color: #00ff00;
            padding: 15px;
            overflow-x: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            max-width: 420px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ff00;
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #0f0; }
            50% { text-shadow: -2px -2px #0f0; }
            100% { text-shadow: 2px 2px #0f0; }
        }

        .card {
            border: 1px solid #00ff00;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.85);
            box-shadow: 0 0 10px #00ff00;
        }

        .card h2 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .info {
            font-size: 13px;
            color: #aaffaa;
        }

        button {
            width: 100%;
            padding: 10px;
            border: 1px solid #00ff00;
            background: black;
            color: #00ff00;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }

        button:hover {
            background: #00ff00;
            color: black;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>XRExZOB SYSTEM</h1>

    <div class="card">
        <h2>🧠 CPU</h2>
        <div class="info" id="cpu">Scanning...</div>
    </div>

    <div class="card">
        <h2>💾 RAM</h2>
        <div class="info" id="ram">Scanning...</div>
    </div>

    <div class="card">
        <h2>🔋 BATTERY</h2>
        <div class="info" id="battery">Scanning...</div>
    </div>

    <div class="card">
        <h2>📶 NETWORK</h2>
        <div class="info" id="network">Scanning...</div>
    </div>

    <div class="card">
        <h2>📱 DEVICE</h2>
        <div class="info" id="device">Scanning...</div>
    </div>

    <div class="card">
        <h2>🖥️ SCREEN</h2>
        <div class="info" id="screen">Scanning...</div>
    </div>

    <button onclick="location.reload()">REFRESH SYSTEM</button>

    <div class="footer">
        © 2026 XRExZOB CYBER TERMINAL
    </div>
</div>

<script>
    // CPU
    document.getElementById("cpu").innerHTML =
        "Cores: " + (navigator.hardwareConcurrency || "Unknown");

    // RAM
    document.getElementById("ram").innerHTML =
        "Estimated: " + (navigator.deviceMemory || "Unknown") + " GB";

    // Device Info
    document.getElementById("device").innerHTML =
        navigator.userAgent;

    // Screen Info
    document.getElementById("screen").innerHTML =
        "Resolution: " + screen.width + " x " + screen.height +
        "<br>Pixel Ratio: " + window.devicePixelRatio;

    // Network Info
    if (navigator.connection) {
        document.getElementById("network").innerHTML =
            "Type: " + navigator.connection.effectiveType +
            "<br>Speed: " + navigator.connection.downlink + " Mbps";
    } else {
        document.getElementById("network").innerHTML =
            "Not Available";
    }

    // Battery Info
    if (navigator.getBattery) {
        navigator.getBattery().then(function(battery) {
            function updateBattery() {
                document.getElementById("battery").innerHTML =
                    "Level: " + Math.round(battery.level * 100) + "%" +
                    "<br>Status: " + (battery.charging ? "Charging" : "Discharging");
            }
            updateBattery();
            battery.addEventListener("levelchange", updateBattery);
            battery.addEventListener("chargingchange", updateBattery);
        });
    } else {
        document.getElementById("battery").innerHTML = "Not Supported";
    }

    // Matrix Effect
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    const letters = "01XRExZOB";
    const matrix = letters.split("");

    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00ff00";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = matrix[Math.floor(Math.random() * matrix.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(drawMatrix, 35);
</script>

</body>
</html>
